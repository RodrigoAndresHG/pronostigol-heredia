name: Cerrar partidos (ingesta de resultados)

# Corre CADA HORA e ingiere los marcadores que openfootball ya publicó,
# encendiendo solos el Boletín, el Termómetro y la Autopsia.
#
# Por qué aquí y no solo en Vercel: el plan Hobby de Vercel limita los crons
# a 1 vez al día. GitHub Actions permite cada hora, gratis.
#
# REQUISITO (una sola vez): añade el secret CRON_SECRET en GitHub →
# repo → Settings → Secrets and variables → Actions → New repository secret.
# Usa el MISMO valor que tienes en Vercel.

on:
  schedule:
    - cron: '20 * * * *' # cada hora, al minuto 20 (UTC)
  workflow_dispatch: {} # botón para dispararlo a mano desde la pestaña "Actions"

jobs:
  ingerir:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar /api/cron/cerrar-partidos
        run: |
          echo "Ingiriendo resultados desde openfootball…"
          curl -fsS \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://pronostigol.rodriheredia.com/api/cron/cerrar-partidos"
          echo ""
          echo "Listo."
